name: Tạo Animation Con Rắn

on:
  # Chạy tự động mỗi 12 giờ
  schedule:
    - cron: "0 */12 * * *"
  
  # Cho phép chạy thủ công
  workflow_dispatch:
  
  # Chạy khi push vào main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Tạo snake animation với màu cam đậm nhạt
      - name: Tạo Con Rắn Ăn Contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#ff6600&color_dots=#ffe0b2,#ffcc80,#ffb74d,#ff9800,#e65100
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#ff6600&color_dots=#3a2000,#5c3400,#8b5000,#c47000,#ff9800
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Push kết quả lên branch output
      - name: Push lên branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
